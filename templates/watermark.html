<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark PDF — PDF Tools</title>
    <meta name="description" content="Add text watermarks to your PDF pages.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header class="header">
            <a href="/" class="back-link">&larr; All Tools</a>
            <h1>Watermark PDF</h1>
            <p>Add text watermarks to your PDF pages</p>
        </header>

        <!-- Drop Zone -->
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">💧</div>
            <h3>Drop your PDF here</h3>
            <p>Only PDF files are supported</p>
            <button class="browse-btn" id="browseBtn" type="button">Browse Files</button>
            <input type="file" id="fileInput" accept=".pdf">
        </div>

        <!-- File Info -->
        <div class="file-info-card" id="fileInfoCard" style="display:none;">
            <div class="file-card">
                <div class="file-icon pdf">📄</div>
                <div class="file-info">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-meta" id="fileMeta"></div>
                </div>
                <button class="file-preview" id="previewOrigBtn" title="Preview original">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
                <button class="file-remove" id="removeFileBtn" title="Remove">✕</button>
            </div>
        </div>

        <!-- Watermark Options -->
        <div class="options-panel" id="optionsPanel" style="display:none;">
            <div class="option-row" style="flex-direction:column; align-items:stretch; gap:14px;">
                <div class="option-label">
                    <span class="icon">✏️</span>
                    <span>Watermark Text</span>
                </div>
                <div class="password-input-wrapper">
                    <input type="text" id="watermarkText" placeholder="e.g. CONFIDENTIAL, DRAFT, your name...">
                </div>

                <div style="display:flex; gap:16px; flex-wrap:wrap;">
                    <div style="flex:1; min-width:140px;">
                        <label class="option-label" style="margin-bottom:6px;">
                            <span class="icon">🔆</span>
                            <span>Opacity</span>
                        </label>
                        <select class="tool-select" id="opacitySelect">
                            <option value="0.08">Very Light</option>
                            <option value="0.15" selected>Light</option>
                            <option value="0.3">Medium</option>
                            <option value="0.5">Bold</option>
                        </select>
                    </div>
                    <div style="flex:1; min-width:140px;">
                        <label class="option-label" style="margin-bottom:6px;">
                            <span class="icon">↻</span>
                            <span>Rotation</span>
                        </label>
                        <select class="tool-select" id="rotationSelect">
                            <option value="0">Horizontal (0°)</option>
                            <option value="45" selected>Diagonal (45°)</option>
                            <option value="90">Vertical (90°)</option>
                            <option value="-45">Reverse Diagonal (-45°)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <div class="merge-section" id="actionSection" style="display:none;">
            <button class="merge-btn" id="watermarkBtn">
                <span>💧</span> Add Watermark
            </button>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard" style="display:none;">
            <div class="result-info">
                <span class="result-icon">✅</span>
                <span id="resultText">Watermark added successfully!</span>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <button class="preview-action-btn" id="previewResultBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Preview
                </button>
                <button class="adjust-settings-btn" id="adjustBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    Adjust Settings
                </button>
                <button class="merge-btn" id="downloadBtn" style="padding:14px 32px;">
                    <span>⬇</span> Download
                </button>
            </div>
        </div>

        <footer class="footer">
            <p>PDF Tools — Add watermarks to your documents</p>
        </footer>
    </div>

    <!-- Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-container">
            <div class="preview-header">
                <h3 id="previewTitle">Preview</h3>
                <div class="preview-actions">
                    <button class="preview-close-btn" id="previewCloseBtn" type="button">✕</button>
                </div>
            </div>
            <div class="preview-body">
                <iframe id="previewFrame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Processing...</div>
    </div>

    <script src="{{ url_for('static', filename='watermark.js') }}"></script>
</body>

</html>
