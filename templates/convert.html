<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert to PDF — PDF Tools</title>
    <meta name="description" content="Convert images and Word documents to PDF format.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header class="header">
            <a href="/" class="back-link">&larr; All Tools</a>
            <h1>Convert to PDF</h1>
            <p>Convert images and Word documents to PDF format</p>
        </header>

        <!-- Drop Zone -->
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">🔄</div>
            <h3>Drop your files here</h3>
            <p>Supports JPG, PNG, and Word (.docx) files</p>
            <button class="browse-btn" id="browseBtn" type="button">Browse Files</button>
            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.docx,.doc">
        </div>

        <!-- File Info -->
        <div class="file-info-card" id="fileInfoCard" style="display:none;">
            <div class="file-card">
                <div class="file-icon pdf">📄</div>
                <div class="file-info">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-meta" id="fileMeta"></div>
                </div>
                <button class="file-remove" id="removeFileBtn" title="Remove">✕</button>
            </div>
        </div>

        <!-- Result -->
        <div class="result-card" id="resultCard" style="display:none;">
            <div class="result-info">
                <span class="result-icon">✅</span>
                <span id="resultText">Converted successfully!</span>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <button class="preview-action-btn" id="previewBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Preview
                </button>
                <button class="merge-btn" id="downloadBtn" style="padding:12px 32px;">
                    <span>⬇</span> Download
                </button>
            </div>
        </div>

        <footer class="footer">
            <p>PDF Tools — Convert your files to PDF</p>
        </footer>
    </div>

    <!-- Preview Modal -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-container">
            <div class="preview-header">
                <h3 id="previewTitle">Preview</h3>
                <div class="preview-actions">
                    <button class="preview-close-btn" id="previewCloseBtn" type="button">✕</button>
                </div>
            </div>
            <div class="preview-body">
                <iframe id="previewFrame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Converting...</div>
    </div>

    <script src="{{ url_for('static', filename='convert.js') }}"></script>
</body>

</html>
